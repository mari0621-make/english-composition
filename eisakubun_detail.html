<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英作文練習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ヘッダー */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 0;
    position: relative;
  }
  .close-btn {
    font-size: 1.3em; color: #aaa; text-decoration: none; line-height: 1;
    background: none; border: none; cursor: pointer; padding: 4px;
  }
  .header-title { font-size: 1em; font-weight: bold; color: #333; }

  /* プログレスバー */
  .progress-bar-wrap {
    height: 4px; background: #f0f0f0; margin-top: 12px;
  }
  .progress-bar-fill {
    height: 100%; background: #f7a800;
    transition: width 0.3s ease;
  }

  /* カウンター */
  .counter {
    text-align: center;
    font-size: 0.88em; color: #888;
    margin: 14px 0 10px;
  }

  /* メインカード */
  .card-area {
    flex: 1;
    padding: 10px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* タグ */
  .tag {
    display: inline-block;
    background: #f5f5f5; color: #888;
    font-size: 0.78em; padding: 4px 12px;
    border-radius: 20px; border: 1px solid #e0e0e0;
  }

  /* 問題番号 */
  .q-num-label {
    font-size: 0.75em; color: #f7a800; font-weight: bold; margin-bottom: 2px;
  }

  /* 日本語 */
  .ja-text {
    font-size: 1.22em; color: #222; line-height: 1.65; font-weight: 500;
  }

  /* 英文エリア */
  .en-text {
    font-size: 1.1em; line-height: 2.6;
    color: #f7a800;
    word-break: break-word;
    min-height: 60px;
  }

  /* 空欄 */
  .blank { display: inline; white-space: nowrap; }
  .blank input {
    border: none; border-bottom: 2px solid #f7a800; outline: none;
    font-size: 1em; font-family: inherit; width: 90px;
    background: transparent; padding: 0 4px;
    color: #f7a800; vertical-align: baseline;
  }
  .blank input::placeholder { color: #f7c870; }
  .blank input:focus { border-bottom-color: #e09000; }

  /* 答え合わせ後 */
  .blank.correct input, .blank.wrong input { display: none; }
  .result-wrap { display: inline; }
  .result-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 0.88em; font-weight: bold;
    vertical-align: middle; white-space: nowrap;
  }
  .blank.correct .result-badge {
    background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7;
  }
  .blank.wrong .result-badge {
    background: #fff3f3; color: #c62828; border: 1.5px solid #ef9a9a;
  }
  .answer-hint {
    display: none; font-size: 0.72em; color: #2e7d32;
    font-weight: bold; white-space: nowrap;
    vertical-align: middle; margin-left: 3px;
  }
  .blank.wrong .answer-hint { display: inline; }

  /* 答え合わせボタン */
  .check-btn {
    display: block; width: 100%;
    padding: 13px; background: #f7a800; color: #fff;
    font-size: 1em; font-weight: bold; border: none;
    border-radius: 30px; cursor: pointer;
    transition: background 0.15s;
    margin-top: 6px;
  }
  .check-btn:hover { background: #e09000; }
  .check-btn:disabled { background: #ddd; color: #aaa; cursor: default; }

  /* スコア */
  .score-line {
    text-align: center; font-size: 0.9em; font-weight: bold; min-height: 22px;
  }

  /* リセットリンク */
  .reset-link {
    text-align: center; font-size: 0.8em; color: #bbb;
    cursor: pointer; text-decoration: underline;
  }

  /* 全問正解バナー */
  .complete-banner {
    display: none; background: #f0fdf4; border: 1px solid #bbf7d0;
    border-radius: 14px; padding: 18px; text-align: center; margin-top: 8px;
  }
  .complete-banner.show { display: block; }
  .complete-banner h3 { color: #15803d; margin-bottom: 6px; }
  .complete-banner p { color: #555; font-size: 0.88em; margin-bottom: 12px; }
  .nav-btn {
    display: inline-block; padding: 8px 20px; background: #f7a800;
    color: #fff; font-weight: bold; border: none; border-radius: 20px;
    cursor: pointer; text-decoration: none; margin: 4px; font-size: 0.88em;
  }

  /* 下部ナビ */
  .bottom-nav {
    padding: 18px 40px 36px;
    display: flex; align-items: center; justify-content: center; gap: 40px;
  }
  .nav-arrow {
    background: none; border: none; cursor: pointer;
    color: #f7a800; font-size: 1.6em; padding: 8px;
    transition: opacity 0.15s;
  }
  .nav-arrow:disabled { opacity: 0.2; cursor: default; }
  .nav-center-btn {
    width: 62px; height: 62px; border-radius: 50%;
    background: #f0f0f0; border: none; cursor: pointer;
    font-size: 1.4em; color: #888;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-center-btn:hover { background: #e5e5e5; }

  /* 例文一覧ボタン */
  .list-btn-wrap { text-align: center; padding-bottom: 12px; }
  .list-btn {
    display: inline-block; padding: 9px 28px;
    border: 2px solid #f7a800; border-radius: 30px;
    color: #f7a800; font-size: 0.88em; font-weight: bold;
    text-decoration: none; background: none; cursor: pointer;
  }

  .loading-msg { color: #aaa; text-align: center; margin-top: 80px; padding: 20px; }
  .error-msg { color: #e05555; text-align: center; margin-top: 80px; font-size: 0.9em; padding: 20px; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <a class="close-btn" id="backBtn" href="eisakubun_play.html">✕</a>
  <span class="header-title" id="headerTitle"></span>
  <div style="width:32px;"></div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div class="counter" id="counter"></div>

<!-- メインコンテンツ -->
<div id="mainContent"><p class="loading-msg">読み込み中...</p></div>

<!-- 下部ナビ -->
<div class="bottom-nav" id="bottomNav" style="display:none;">
  <button class="nav-arrow" id="btnPrev" onclick="navigate(-1)">⏮</button>
  <button class="nav-center-btn" id="btnPause" onclick="togglePause()">⏸</button>
  <button class="nav-arrow" id="btnNext" onclick="navigate(1)">⏭</button>
</div>
<div class="list-btn-wrap" id="listBtnWrap" style="display:none;">
  <a class="list-btn" id="listBtn" href="#">例文一覧</a>
</div>

<script>
const SCORE_PREFIX = 'eisakubun_score_';
const params   = new URLSearchParams(location.search);
const unitFile = params.get('file') || '';
const unitName = params.get('name') || '';
const unitTag  = params.get('tag')  || '';

let cards = [];
let currentIdx = 0;
let paused = false;
let checked = []; // 各カードの答え合わせ済みフラグ

document.getElementById('backBtn').href =
  'eisakubun_play.html?tag=' + encodeURIComponent(unitTag);
document.getElementById('listBtn').href =
  'eisakubun_play.html?tag=' + encodeURIComponent(unitTag);

async function load() {
  if (!unitFile) {
    document.getElementById('mainContent').innerHTML = '<p class="error-msg">ファイルが指定されていません。</p>';
    return;
  }
  try {
    const res  = await fetch(unitFile + '?v=' + Date.now());
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1).filter(l => l.trim());
    cards = lines.map((line, i) => {
      const cols = parseCSV(line);
      return { id: i, title: cols[0]?.trim(), ja: cols[1]?.trim(), en: cols[2]?.trim() };
    }).filter(c => c.ja && c.en);

    if (cards.length === 0) {
      document.getElementById('mainContent').innerHTML = '<p class="error-msg">問題が見つかりません。</p>';
      return;
    }

    checked = new Array(cards.length).fill(false);
    document.getElementById('headerTitle').textContent = unitName;
    document.getElementById('bottomNav').style.display = '';
    document.getElementById('listBtnWrap').style.display = '';
    renderCard(0);
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<p class="error-msg">「' + unitFile + '」の読み込みに失敗しました。</p>';
  }
}

function parseCSV(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
    cur += ch;
  }
  cols.push(cur);
  return cols;
}

function buildEnHtml(enStr) {
  return enStr.replace(/\{([^}]+)\}/g, (_, answer) => {
    return '<span class="blank">' +
      '<input type="text" placeholder="…" data-answer="' + answer.replace(/"/g, '&quot;') + '">' +
      '<span class="result-wrap">' +
        '<span class="result-badge"></span>' +
        '<span class="answer-hint"></span>' +
      '</span>' +
    '</span> ';
  });
}

function renderCard(idx) {
  currentIdx = idx;
  const card = cards[idx];
  const total = cards.length;

  // プログレス・カウンター
  document.getElementById('progressBar').style.width = ((idx + 1) / total * 100) + '%';
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + total;

  // ナビゲーションボタン
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === total - 1;

  const html =
    '<div class="card-area">' +
      '<div><span class="tag">' + (unitTag || '') + '</span></div>' +
      '<div>' +
        '<div class="q-num-label">Q' + (idx + 1) + '　' + (card.title || '') + '</div>' +
        '<div class="ja-text">' + card.ja + '</div>' +
      '</div>' +
      '<div class="en-text">' + buildEnHtml(card.en) + '</div>' +
      '<button class="check-btn" id="checkBtn" onclick="checkCard()">✔ 答え合わせ</button>' +
      '<div class="score-line" id="scoreLine"></div>' +
      '<div class="reset-link" id="resetLink" style="display:none;" onclick="resetCard()">↺ リセット</div>' +
      '<div class="complete-banner" id="completeBanner">' +
        '<h3>🎉 全問正解！</h3>' +
        '<p id="completeMsg"></p>' +
        '<button class="nav-btn" onclick="resetCard()">↺ もう一度</button>' +
        (idx < total - 1 ? '<button class="nav-btn" onclick="navigate(1)">次の問題 →</button>' : '') +
      '</div>' +
    '</div>';

  document.getElementById('mainContent').innerHTML = html;

  // 答え合わせ済みなら復元
  if (checked[idx]) restoreChecked();
}

function checkCard() {
  const inputs = document.querySelectorAll('.blank input');
  let correct = 0;
  inputs.forEach(input => {
    const span = input.parentElement;
    const badge = span.querySelector('.result-badge');
    const hint  = span.querySelector('.answer-hint');
    if (normalize(input.value) === normalize(input.dataset.answer)) {
      span.classList.remove('wrong'); span.classList.add('correct');
      badge.textContent = '○ ' + input.dataset.answer;
      hint.textContent = '';
      correct++;
    } else {
      span.classList.remove('correct'); span.classList.add('wrong');
      badge.textContent = '× ' + (input.value.trim() || '（空白）');
      hint.textContent  = '→ ' + input.dataset.answer;
    }
  });
  const total = inputs.length;
  const scoreEl = document.getElementById('scoreLine');
  scoreEl.textContent = '結果：' + correct + ' / ' + total + ' 正解';
  scoreEl.style.color = correct === total ? '#4caf50' : '#f44336';
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('resetLink').style.display = '';
  checked[currentIdx] = true;

  const key  = SCORE_PREFIX + unitFile;
  const prev = JSON.parse(localStorage.getItem(key) || '{"best":0,"count":0}');
  const pct  = Math.round((correct / total) * 100);
  localStorage.setItem(key, JSON.stringify({ best: Math.max(prev.best, pct), count: prev.count + 1 }));

  if (correct === total) {
    document.getElementById('completeBanner').classList.add('show');
    document.getElementById('completeMsg').textContent = total + '問すべて正解！';
  }
}

function restoreChecked() {
  // すでにHTML生成済みなので、チェックボタンをdisabledにするだけ
  const btn = document.getElementById('checkBtn');
  if (btn) btn.disabled = false; // 再チャレンジ可能
}

function resetCard() {
  checked[currentIdx] = false;
  document.querySelectorAll('.blank').forEach(span => {
    span.classList.remove('correct', 'wrong');
    const input = span.querySelector('input');
    if (input) input.value = '';
    const badge = span.querySelector('.result-badge');
    if (badge) badge.textContent = '';
    const hint = span.querySelector('.answer-hint');
    if (hint) hint.textContent = '';
  });
  document.getElementById('scoreLine').textContent = '';
  document.getElementById('completeBanner')?.classList.remove('show');
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('resetLink').style.display = 'none';
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < cards.length) renderCard(next);
}

function togglePause() {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶' : '⏸';
}

function normalize(s) { return s.toLowerCase().replace(/\s+/g, ''); }

load();
</script>
</body>
</html>
