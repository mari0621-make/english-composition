<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英作文練習</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; line-height: 2.2; background: #fff; min-height: 100vh; padding: 24px 20px 60px; }
  .back-btn {
    display: inline-block; text-decoration: none; background: #FFD700; color: #333;
    font-size: 0.85em; font-weight: bold; padding: 8px 16px; border-radius: 20px; margin-bottom: 16px;
  }
  h2 { font-size: 1.3em; color: #333; margin-bottom: 4px; }
  .subtitle { font-size: 0.85em; color: #999; margin-bottom: 24px; }
  .question-block { margin-bottom: 28px; }
  .q-num { font-size: 0.8em; color: #f48fb1; font-weight: bold; margin-bottom: 2px; }
  .ja { color: #555; font-size: 0.9em; margin-bottom: 4px; line-height: 1.6; }
  .en { margin-top: 0; line-height: 2.8; word-break: break-word; }

  /* 入力欄：インラインで文章に馴染む */
  .blank { display: inline; white-space: nowrap; }
  .blank input {
    border: none; border-bottom: 2px solid #bbb; outline: none;
    font-size: 1em; font-family: inherit; width: 100px; background: transparent; padding: 0 4px;
    vertical-align: baseline;
  }
  .blank input:focus { border-bottom-color: #FFD700; }

  /* 答え合わせ後: 入力欄を非表示 */
  .blank.correct input,
  .blank.wrong input { display: none; }

  /* インラインバッジ */
  .result-wrap { display: inline; }
  .result-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.88em;
    font-weight: bold;
    vertical-align: middle;
    white-space: nowrap;
  }
  .blank.correct .result-badge {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1.5px solid #a5d6a7;
  }
  .blank.wrong .result-badge {
    background: #fff3f3;
    color: #c62828;
    border: 1.5px solid #ef9a9a;
  }

  /* 正解ヒント（不正解時のみ・バッジの直後に小さく） */
  .answer-hint {
    display: none;
    font-size: 0.72em;
    color: #2e7d32;
    font-weight: bold;
    white-space: nowrap;
    vertical-align: middle;
    margin-left: 3px;
  }
  .blank.wrong .answer-hint { display: inline; }

  .btn-wrap { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
  .check-btn { padding: 10px 28px; background: #FFD700; color: #333; font-size: 1em; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; }
  .check-btn:hover { background: #ffc200; }
  .reset-btn { padding: 10px 20px; background: #eee; color: #555; font-size: 0.9em; border: none; border-radius: 20px; cursor: pointer; }
  .reset-btn:hover { background: #ddd; }
  .score { font-size: 1.1em; font-weight: bold; color: #333; margin-top: 10px; }
  .complete-banner { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 20px; text-align: center; margin-top: 20px; }
  .complete-banner.show { display: block; }
  .complete-banner h3 { color: #15803d; margin-bottom: 8px; }
  .complete-banner p  { color: #555; font-size: 0.9em; margin-bottom: 14px; }
  .nav-btn { display: inline-block; padding: 10px 24px; background: #FFD700; color: #333; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; text-decoration: none; margin: 4px; font-size: 0.9em; }
  .loading-msg { color: #aaa; text-align: center; margin-top: 60px; }
  .error-msg   { color: #e05555; text-align: center; margin-top: 60px; font-size: 0.9em; }
</style>
</head>
<body>

<a class="back-btn" id="backBtn" href="eisakubun_play.html">← 単元一覧へ戻る</a>

<div id="mainContent"><p class="loading-msg">読み込み中...</p></div>

<script>
const SCORE_PREFIX = 'eisakubun_score_';
const params   = new URLSearchParams(location.search);
const unitFile = params.get('file') || '';
const unitName = params.get('name') || '';
const unitTag  = params.get('tag')  || '';

// 戻るボタン
document.getElementById('backBtn').href =
  'eisakubun_play.html?tag=' + encodeURIComponent(unitTag);

async function load() {
  if (!unitFile) {
    document.getElementById('mainContent').innerHTML = '<p class="error-msg">ファイルが指定されていません。</p>';
    return;
  }
  try {
    const res  = await fetch(unitFile + '?v=' + Date.now());
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1).filter(l => l.trim());

    const cards = lines.map((line, i) => {
      const cols = parseCSV(line);
      return { id: i, title: cols[0]?.trim(), ja: cols[1]?.trim(), en: cols[2]?.trim() };
    }).filter(c => c.ja && c.en);

    if (cards.length === 0) {
      document.getElementById('mainContent').innerHTML = '<p class="error-msg">問題が見つかりません。</p>';
      return;
    }

    renderPage(cards);
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<p class="error-msg">「' + unitFile + '」の読み込みに失敗しました。<br>GitHubにアップロードされているか確認してください。</p>';
  }
}

function parseCSV(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
    cur += ch;
  }
  cols.push(cur);
  return cols;
}

function buildEnHtml(enStr) {
  return enStr.replace(/\{([^}]+)\}/g, (_, answer) => {
    return '<span class="blank">' +
      '<input type="text" placeholder="…" data-answer="' + answer.replace(/"/g, '&quot;') + '">' +
      '<span class="result-wrap">' +
        '<span class="result-badge"></span>' +
        '<span class="answer-hint"></span>' +
      '</span>' +
    '</span> ';
  });
}

function renderPage(cards) {
  let html = '<h2>' + unitName + '</h2>' +
    '<p class="subtitle">「' + unitTag + '」 ／ ' + cards.length + '文 ／ 空欄を埋めて答え合わせ</p>';

  cards.forEach((card, idx) => {
    html += '<div class="question-block">' +
      '<div class="q-num">Q' + (idx + 1) + '　' + card.title + '</div>' +
      '<p class="ja">📌 ' + card.ja + '</p>' +
      '<p class="en">' + buildEnHtml(card.en) + '</p>' +
      '</div>';
  });

  html += '<div class="btn-wrap">' +
    '<button class="check-btn" onclick="checkAll()">✔ 答え合わせ</button>' +
    '<button class="reset-btn" onclick="resetAll()">↺ リセット</button>' +
    '</div>' +
    '<div class="score" id="score"></div>' +
    '<div class="complete-banner" id="completeBanner">' +
    '<h3>🎉 全問正解！</h3>' +
    '<p id="completeMsg"></p>' +
    '<a class="nav-btn" href="eisakubun_play.html?tag=' + encodeURIComponent(unitTag) + '">← 一覧へ戻る</a>' +
    '<button class="nav-btn" onclick="resetAll()">↺ もう一度</button>' +
    '</div>';

  document.getElementById('mainContent').innerHTML = html;
}

function normalize(s) { return s.toLowerCase().replace(/\s+/g, ''); }

function checkAll() {
  const inputs = document.querySelectorAll('.blank input');
  let correct = 0;
  inputs.forEach(input => {
    const span = input.parentElement;
    const badge = span.querySelector('.result-badge');
    const hint  = span.querySelector('.answer-hint');

    if (normalize(input.value) === normalize(input.dataset.answer)) {
      span.classList.remove('wrong');
      span.classList.add('correct');
      badge.textContent = '○ ' + input.dataset.answer;
      hint.textContent  = '';
      correct++;
    } else {
      span.classList.remove('correct');
      span.classList.add('wrong');
      const userVal = input.value.trim() || '（空白）';
      badge.textContent = '× ' + userVal;
      hint.textContent  = '→ ' + input.dataset.answer;
    }
  });

  const total = inputs.length;
  const scoreEl = document.getElementById('score');
  scoreEl.textContent = '結果：' + correct + ' / ' + total + ' 正解';
  scoreEl.style.color = correct === total ? '#4caf50' : '#f44336';

  // スコア保存（単元CSVファイル名をキーに）
  const key  = SCORE_PREFIX + unitFile;
  const prev = JSON.parse(localStorage.getItem(key) || '{"best":0,"count":0}');
  const pct  = Math.round((correct / total) * 100);
  localStorage.setItem(key, JSON.stringify({ best: Math.max(prev.best, pct), count: prev.count + 1 }));

  if (correct === total) {
    document.getElementById('completeBanner').classList.add('show');
    document.getElementById('completeMsg').textContent = total + '問すべて正解しました！';
  }
}

function resetAll() {
  document.querySelectorAll('.blank').forEach(span => {
    span.classList.remove('correct', 'wrong');
    const input = span.querySelector('input');
    if (input) input.value = '';
    const badge = span.querySelector('.result-badge');
    if (badge) badge.textContent = '';
    const hint = span.querySelector('.answer-hint');
    if (hint) hint.textContent = '';
  });
  document.getElementById('score').textContent = '';
  document.getElementById('completeBanner')?.classList.remove('show');
}

load();
</script>
</body>
</html>
