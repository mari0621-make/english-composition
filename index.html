<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: sans-serif;
    background: #fff;
    min-height: 100vh;
    padding: 30px 20px;
    overflow-x: hidden;
  }

  canvas#sakura {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  header, .grid {
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  header h1 {
    font-size: 1.8em;
    color: #333;
  }

  header p {
    color: #999;
    margin-top: 6px;
    font-size: 0.95em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid #fce4ec;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(233,84,130,0.15);
  }

  .card-number {
    font-size: 0.78em;
    color: #f48fb1;
    font-weight: bold;
    letter-spacing: 0.05em;
  }

  .card-title {
    font-size: 1.1em;
    font-weight: bold;
    color: #222;
  }

  .card-desc {
    font-size: 0.88em;
    color: #666;
    line-height: 1.6;
  }

  .card-tag {
    display: inline-block;
    margin-top: 4px;
    background: #fce4ec;
    color: #c2185b;
    font-size: 0.78em;
    padding: 3px 10px;
    border-radius: 20px;
    width: fit-content;
  }
</style>

<script>
const canvas = document.getElementById('sakura');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PETAL_COUNT = 40;
const petals = [];

function randomPetal() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    size: Math.random() * 8 + 6,
    speedY: Math.random() * 1.2 + 0.6,
    speedX: Math.random() * 0.8 - 0.4,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.04,
    opacity: Math.random() * 0.5 + 0.4,
    swing: Math.random() * 0.8 + 0.3,
    swingOffset: Math.random() * Math.PI * 2,
    tick: 0,
  };
}

for (let i = 0; i < PETAL_COUNT; i++) {
  const p = randomPetal();
  p.y = Math.random() * canvas.height;
  petals.push(p);
}

function drawPetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  ctx.globalAlpha = p.opacity;
  ctx.beginPath();
  ctx.ellipse(0, 0, p.size * 0.5, p.size, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f8bbd0';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 0, p.size * 0.3, p.size * 0.7, 0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fce4ec';
  ctx.fill();
  ctx.restore();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of petals) {
    p.tick++;
    p.y += p.speedY;
    p.x += p.speedX + Math.sin(p.tick * 0.03 + p.swingOffset) * p.swing;
    p.angle += p.spin;
    if (p.y > canvas.height + 20) {
      Object.assign(p, randomPetal());
    }
    drawPetal(p);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
