<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英作文 単元一覧</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #fff; min-height: 100vh; padding: 30px 20px; overflow-x: hidden; }
  canvas#sakura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  header, main { position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 30px; }
  .back-btn {
    display: inline-block; text-decoration: none; background: #FFD700; color: #333;
    font-size: 0.85em; font-weight: bold; padding: 7px 16px; border-radius: 20px; margin-bottom: 14px;
  }
  header h1 { font-size: 1.8em; color: #333; }
  header p  { color: #999; margin-top: 6px; font-size: 0.95em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; max-width: 900px; margin: 0 auto; }
  .card {
    background: white; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; color: inherit;
    transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column;
    gap: 8px; border: 1px solid #fce4ec; cursor: pointer;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(233,84,130,0.15); }
  .card-number { font-size: 0.76em; color: #f48fb1; font-weight: bold; }
  .card-title  { font-size: 1em; font-weight: bold; color: #222; }
  .card-tag    { display: inline-block; background: #fce4ec; color: #c2185b; font-size: 0.75em; padding: 3px 10px; border-radius: 20px; width: fit-content; }
  .progress-wrap  { background: #fce4ec; border-radius: 10px; height: 7px; overflow: hidden; margin-top: 2px; }
  .progress-bar   { height: 7px; background: #e91e63; border-radius: 10px; width: 0%; transition: width 0.6s ease; }
  .progress-label { font-size: 0.75em; color: #c2185b; }
  .loading-msg { text-align: center; color: #bbb; margin-top: 60px; font-size: 0.95em; }
  .error-msg   { text-align: center; color: #e05555; margin-top: 60px; font-size: 0.9em; }
</style>
</head>
<body>
<canvas id="sakura"></canvas>
<header>
  <div><a class="back-btn" href="eisakubun.html">← テーマ一覧へ</a></div>
  <h1 id="pageTitle">🌸 英作文復習</h1>
  <p id="pageSubtitle">単元を選んでください</p>
  <div id="totalScore" style="margin-top:10px;font-size:0.88em;color:#c2185b;font-weight:bold;min-height:20px;"></div>
</header>
<main id="mainContent"><p class="loading-msg">読み込み中...</p></main>

<script>
const MASTER_CSV   = 'eisakubun.csv';
const SCORE_PREFIX = 'eisakubun_score_';
const params       = new URLSearchParams(location.search);
const filterTag    = params.get('tag') || '';

async function load() {
  try {
    const res  = await fetch(MASTER_CSV + '?v=' + Date.now());
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1).filter(l => l.trim());

    const units = lines.map(line => {
      const cols = parseCSV(line);
      return { tag: cols[0]?.trim(), name: cols[1]?.trim(), file: cols[2]?.trim() };
    }).filter(u => u.tag === filterTag);

    document.getElementById('pageTitle').textContent  = '🌸 ' + filterTag;
    document.getElementById('pageSubtitle').textContent = '全' + units.length + '単元';

    const main = document.getElementById('mainContent');
    const grid = document.createElement('div');
    grid.className = 'grid';

    units.forEach((unit, idx) => {
      const scoreData = JSON.parse(localStorage.getItem(SCORE_PREFIX + unit.file) || 'null');
      const pct   = scoreData ? scoreData.best  : 0;
      const count = scoreData ? scoreData.count : 0;

      const card = document.createElement('a');
      card.className = 'card';
      card.href = 'eisakubun_detail.html?file=' + encodeURIComponent(unit.file) + '&name=' + encodeURIComponent(unit.name) + '&tag=' + encodeURIComponent(unit.tag);
      card.innerHTML =
        '<span class="card-number">No.' + String(idx + 1).padStart(2, '0') + '</span>' +
        '<span class="card-title">' + unit.name + '</span>' +
        '<span class="card-tag">' + unit.tag + '</span>' +
        '<div class="progress-wrap"><div class="progress-bar" data-pct="' + pct + '" style="width:0%"></div></div>' +
        '<span class="progress-label">' + (count > 0 ? '最高 ' + pct + '％ ／ ' + count + '回挑戦' : '未挑戦') + '</span>';
      grid.appendChild(card);
    });

    main.innerHTML = '';
    main.appendChild(grid);

    // 全体正解率を集計
    let totalCorrect = 0, totalQuestions = 0;
    units.forEach(unit => {
      const sd = JSON.parse(localStorage.getItem(SCORE_PREFIX + unit.file) || 'null');
      if (sd && sd.total > 0) {
        totalCorrect   += sd.correct || 0;
        totalQuestions += sd.total   || 0;
      }
    });
    const scoreEl = document.getElementById('totalScore');
    if (totalQuestions > 0) {
      const overallPct = Math.round((totalCorrect / totalQuestions) * 100);
      scoreEl.textContent = '直近の全体正解率：' + totalCorrect + ' / ' + totalQuestions + ' 正解（' + overallPct + '%）';
    }

    setTimeout(() => {
      document.querySelectorAll('.progress-bar[data-pct]').forEach(b => { b.style.width = b.dataset.pct + '%'; });
    }, 100);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<p class="error-msg">読み込みに失敗しました。</p>';
  }
}

function parseCSV(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
    cur += ch;
  }
  cols.push(cur);
  return cols;
}

load();

// 桜
const canvas = document.getElementById('sakura'), ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const petals = [];
function rp() { return { x: Math.random()*canvas.width, y: Math.random()*canvas.height-canvas.height, size: Math.random()*8+6, speedY: Math.random()*1.2+0.6, speedX: Math.random()*0.8-0.4, angle: Math.random()*Math.PI*2, spin: (Math.random()-0.5)*0.04, opacity: Math.random()*0.5+0.4, swing: Math.random()*0.8+0.3, swingOffset: Math.random()*Math.PI*2, tick: 0 }; }
for (let i=0;i<40;i++){const p=rp();p.y=Math.random()*canvas.height;petals.push(p);}
function dp(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.globalAlpha=p.opacity;ctx.beginPath();ctx.ellipse(0,0,p.size*.5,p.size,0,0,Math.PI*2);ctx.fillStyle='#f8bbd0';ctx.fill();ctx.beginPath();ctx.ellipse(0,0,p.size*.3,p.size*.7,.5,0,Math.PI*2);ctx.fillStyle='#fce4ec';ctx.fill();ctx.restore();}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);petals.forEach(p=>{p.tick++;p.y+=p.speedY;p.x+=p.speedX+Math.sin(p.tick*.03+p.swingOffset)*p.swing;p.angle+=p.spin;if(p.y>canvas.height+20)Object.assign(p,rp());dp(p);});requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
