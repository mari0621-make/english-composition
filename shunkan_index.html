<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬間英作文</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Lato:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 60px;
  }

  header { text-align: center; margin-bottom: 28px; width: 100%; }

  .back-btn {
    display: inline-block;
    text-decoration: none;
    background: #FFD700;
    color: #333;
    font-size: 0.85em;
    font-weight: bold;
    padding: 7px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  header h1 { font-size: 1.5em; color: #333; margin-top: 4px; }
  header p  { color: #999; font-size: 0.85em; margin-top: 4px; }

  .progress-info { font-size: 0.85em; color: #aaa; margin-bottom: 6px; text-align: center; }

  .card-wrap { width: 100%; max-width: 500px; margin-bottom: 24px; }

  .card {
    width: 100%;
    min-height: 260px;
    border-radius: 18px;
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid #e8edf2;
    transition: box-shadow 0.2s;
  }

  .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.14); }
  .card-label { font-size: 0.72em; font-weight: bold; letter-spacing: 0.1em; color: #bbb; margin-bottom: 16px; }
  .ja-text { font-size: 1.15em; color: #222; line-height: 1.8; font-weight: 700; }

  .en-text {
    font-family: 'Lato', sans-serif;
    font-size: 1.05em;
    color: #2a6ebb;
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1.5px dashed #d0dce8;
    width: 100%;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.5s, max-height 0.5s;
  }

  .en-text.visible { opacity: 1; max-height: 200px; }
  .tap-hint { font-size: 0.78em; color: #ccc; margin-top: 18px; }

  .timer-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
  .timer-svg { transform: rotate(-90deg); }
  .timer-bg  { fill: none; stroke: #e8edf2; stroke-width: 5; }
  .timer-ring {
    fill: none; stroke: #4a90d9; stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  .timer-text { font-size: 1.1em; font-weight: bold; color: #333; margin-top: 6px; }

  .judge-row { display: none; gap: 16px; width: 100%; max-width: 500px; margin-bottom: 14px; }
  .judge-row.show { display: flex; }

  .btn-judge {
    flex: 1; padding: 14px 0; border: none; border-radius: 14px;
    font-size: 1.2em; font-weight: bold; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: transform 0.1s;
  }
  .btn-judge:active { transform: scale(0.96); }
  .btn-circle { background: #e8f5e9; color: #2e7d32; }
  .btn-cross  { background: #ffebee; color: #c62828; }

  .btn-row { display: flex; gap: 12px; width: 100%; max-width: 500px; margin-bottom: 16px; }

  .btn {
    flex: 1; padding: 13px 0; border: none; border-radius: 12px;
    font-size: 0.95em; font-weight: bold; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-reveal { background: #2a6ebb; color: white; }
  .btn-reset  { background: #eee; color: #777; flex: 0 0 auto; padding: 13px 20px; }

  .complete {
    display: none; flex-direction: column; align-items: center;
    text-align: center; gap: 16px; margin-top: 40px; width: 100%; max-width: 400px;
  }
  .complete.show { display: flex; }
  .complete h2 { font-size: 1.6em; color: #333; }
  .complete p  { color: #888; font-size: 0.95em; }

  .complete-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }

  .btn-complete {
    padding: 14px; border: none; border-radius: 12px;
    font-size: 0.95em; font-weight: bold; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    text-decoration: none; text-align: center; display: block;
    transition: transform 0.1s;
  }
  .btn-complete:active { transform: scale(0.97); }
  .btn-retry { background: #FFD700; color: #333; }
  .btn-back  { background: #eee; color: #555; }

  /* ローディング */
  .loading {
    color: #aaa; font-size: 0.95em; margin-top: 60px; text-align: center;
  }
</style>
</head>
<body>

<header>
  <div><a class="back-btn" href="shunkan_menu.html">← メニューへ戻る</a></div>
  <h1>⚡ 瞬間英作文</h1>
  <p>日本語を見て英語に変換しよう</p>
</header>

<div class="progress-info" id="progressInfo"></div>

<div class="timer-wrap">
  <svg class="timer-svg" width="70" height="70" viewBox="0 0 70 70">
    <circle class="timer-bg" cx="35" cy="35" r="28"/>
    <circle class="timer-ring" id="timerRing" cx="35" cy="35" r="28"
      stroke-dasharray="175.9" stroke-dashoffset="0"/>
  </svg>
  <div class="timer-text" id="timerText">60</div>
</div>

<div class="card-wrap">
  <div class="card" id="mainCard" onclick="revealAnswer()">
    <div class="card-label">日本語 → 英語</div>
    <div class="ja-text" id="jaText"><span class="loading">問題を読み込み中...</span></div>
    <div class="en-text" id="enText"></div>
    <div class="tap-hint" id="tapHint" style="display:none">タップして英語を確認</div>
  </div>
</div>

<div class="judge-row" id="judgeRow">
  <button class="btn-judge btn-circle" onclick="judge(true)">○ できた</button>
  <button class="btn-judge btn-cross"  onclick="judge(false)">× できなかった</button>
</div>

<div class="btn-row">
  <button class="btn btn-reveal" onclick="revealAnswer()">英語を見る</button>
  <button class="btn btn-reset"  onclick="if(confirm('リセットしますか？')) resetAll()">↺</button>
</div>

<div class="complete" id="completeScreen">
  <div style="font-size:2.5em">🎉</div>
  <h2>お疲れさまでした！</h2>
  <p id="completeMsg"></p>
  <div class="complete-btns">
    <button class="btn-complete btn-retry" onclick="resetAll()">↺ もう一度挑戦</button>
    <a class="btn-complete btn-back" href="shunkan_menu.html">← メニューへ戻る</a>
  </div>
</div>

<script>
const WRONG_KEY = 'shunkan_wrong';
const CSV_PATH  = 'cards.csv'; // ← CSVファイルのパス（同じフォルダに置く）

const circumference = 175.9;
const TOTAL = 60;

let cards   = [];
let current = 0;
let timer   = null;
let seconds = TOTAL;

// ── CSV読み込み ──────────────────────────
async function loadCSV() {
  try {
    const res = await fetch(CSV_PATH + '?v=' + Date.now()); // キャッシュ回避
    const text = await res.text();
    const lines = text.trim().split('\n');
    // 1行目はヘッダー（日本語,英語）なのでスキップ
    cards = lines.slice(1).map((line, i) => {
      // カンマ区切りだが、文中にカンマがある場合も考慮
      const match = line.match(/^"?(.+?)"?,(.+)$/) || line.split(',');
      let ja, en;
      if (Array.isArray(match) && match[0] !== undefined && match.length > 2) {
        ja = match[1].trim();
        en = match[2].trim();
      } else {
        const idx = line.indexOf(',');
        ja = line.slice(0, idx).trim().replace(/^"|"$/g, '');
        en = line.slice(idx + 1).trim().replace(/^"|"$/g, '');
      }
      return { id: i, ja, en };
    }).filter(c => c.ja && c.en);

    if (cards.length === 0) throw new Error('問題が見つかりません');

    // mode=wrong のときは×の問題だけに絞る
    const params = new URLSearchParams(location.search);
    if (params.get('mode') === 'wrong') {
      const wrongIds = getWrongIds();
      cards = cards.filter(c => wrongIds.includes(c.id));
      if (cards.length === 0) {
        alert('できなかった問題がありません。');
        location.href = 'shunkan_menu.html';
        return;
      }
    }

    loadCard();
  } catch (e) {
    document.getElementById('jaText').innerHTML =
      `<span style="color:#e05555;font-size:0.9em;">CSVの読み込みに失敗しました。<br>cards.csv が同じフォルダにあるか確認してください。</span>`;
  }
}

// ── localStorage ─────────────────────────
function getWrongIds() { return JSON.parse(localStorage.getItem(WRONG_KEY) || '[]'); }
function saveWrongIds(ids) { localStorage.setItem(WRONG_KEY, JSON.stringify(ids)); }

// ── カード表示 ───────────────────────────
function loadCard() {
  const c = cards[current];
  document.getElementById('jaText').textContent = c.ja;
  document.getElementById('enText').textContent = c.en;
  document.getElementById('enText').classList.remove('visible');
  document.getElementById('tapHint').style.display = '';
  document.getElementById('judgeRow').classList.remove('show');
  document.getElementById('progressInfo').textContent = `${current + 1} / ${cards.length}`;
  document.getElementById('mainCard').style.display = 'flex';
  document.getElementById('completeScreen').classList.remove('show');
  startTimer();
}

function startTimer() {
  clearInterval(timer);
  seconds = TOTAL;
  updateTimer();
  timer = setInterval(() => {
    seconds--;
    updateTimer();
    if (seconds <= 0) { clearInterval(timer); revealAnswer(); }
  }, 1000);
}

function updateTimer() {
  const ratio  = seconds / TOTAL;
  const offset = circumference * (1 - ratio);
  const ring   = document.getElementById('timerRing');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = seconds > 20 ? '#4a90d9' : seconds > 10 ? '#f0a500' : '#e05555';
  document.getElementById('timerText').textContent = seconds;
}

function revealAnswer() {
  clearInterval(timer);
  document.getElementById('enText').classList.add('visible');
  document.getElementById('tapHint').style.display = 'none';
  document.getElementById('judgeRow').classList.add('show');
}

function judge(correct) {
  const cardId  = cards[current].id;
  let wrongIds  = getWrongIds();
  if (correct) {
    wrongIds = wrongIds.filter(id => id !== cardId);
  } else {
    if (!wrongIds.includes(cardId)) wrongIds.push(cardId);
  }
  saveWrongIds(wrongIds);
  document.getElementById('judgeRow').classList.remove('show');
  current++;
  if (current >= cards.length) { showComplete(); } else { loadCard(); }
}

function showComplete() {
  clearInterval(timer);
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('judgeRow').classList.remove('show');
  document.getElementById('progressInfo').textContent = '完了！';
  document.getElementById('completeScreen').classList.add('show');
  const wrongCount = getWrongIds().length;
  document.getElementById('completeMsg').textContent = `現在の × リスト：${wrongCount}問`;
}

function resetAll() {
  current = 0;
  document.getElementById('mainCard').style.display = 'flex';
  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('judgeRow').classList.remove('show');
  loadCard();
}

// 起動時にCSVを読み込む
loadCSV();
</script>

</body>
</html>
